<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tareas — Academic Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/dark-mode.css" />
  <style>
    /* ── Page-specific overrides ── */
    body { display: flex; }

    .page-wrap {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 2.5rem 2.25rem;
      max-width: 900px;
    }

    /* Task stats row */
    .tasks-kpi {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1.75rem;
    }
    .tasks-kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 1rem 1.25rem;
      box-shadow: var(--shadow-sm);
    }
    .tasks-kpi-label { font-size: .72rem; color: var(--text-3); margin-bottom: 6px; }
    .tasks-kpi-value { font-size: 1.5rem; font-weight: 600; letter-spacing: -.03em; }

    /* Priority section dividers */
    .priority-section { margin-bottom: 1.5rem; }
    .priority-label {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: .5rem;
      padding-left: 2px;
    }

    @media (max-width: 768px) {
      .page-wrap { margin-left: 0; padding: 1.25rem; padding-top: 4.5rem; }
      .tasks-kpi { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .tasks-kpi { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <!-- Sidebar overlay -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- ── SIDEBAR (shared component) ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-mark"></div>
        <span class="logo-text"><a href="../index.html">Academic<strong>Planner</strong></a></span>
      </div>
    </div>
    <div class="sidebar-profile" onclick="window.location='profile.html'">
      <div class="avatar" id="sidebarAvatar"><span id="sidebarInitials">–</span></div>
      <div class="profile-meta">
        <span class="profile-name" id="sidebarName">Mi perfil</span>
        <span class="profile-sub"  id="sidebarSub">Estudiante</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-group-label">General</div>
      <a class="nav-item" href="../index.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/></svg>
        Dashboard
      </a>
      <a class="nav-item active" href="tasks.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Tareas
        <span class="nav-badge" id="navBadge">0</span>
      </a>
      <a class="nav-item" href="grades.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1l1.9 3.8 4.2.6-3 2.9.7 4.2L8 10.4l-3.8 2 .7-4.2-3-2.9 4.2-.6L8 1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        Notas
      </a>
      <div class="nav-group-label">Productividad</div>
      <a class="nav-item" href="pomodoro.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="9" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M8 6v3l2 1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 1h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Pomodoro
      </a>
      <a class="nav-item" href="calendar.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3" width="13" height="11.5" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M1.5 7h13" stroke="currentColor" stroke-width="1.4"/><path d="M5 1.5V4M11 1.5V4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Calendario
      </a>
      <div class="nav-group-label">Cuenta</div>
      <a class="nav-item" href="profile.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Perfil
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">
        <svg id="themeIcon" width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 1v1M7.5 13v1M1 7.5H2M13 7.5h1M3.2 3.2l.7.7M11.1 11.1l.7.7M3.2 11.8l.7-.7M11.1 4.4l.7-.7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="7.5" cy="7.5" r="3" stroke="currentColor" stroke-width="1.4"/></svg>
        <span id="themeLabel">Modo oscuro</span>
        <div class="toggle" id="themeToggle"></div>
      </button>
    </div>
  </aside>

  <!-- Mobile topbar -->
  <div class="topbar-mobile">
    <button class="hamburger" onclick="openSidebar()"><span></span><span></span><span></span></button>
    <span class="topbar-title">Tareas</span>
  </div>

  <!-- ── MAIN ── -->
  <div class="page-wrap">

    <div class="page-header">
      <div>
        <h1 class="page-title">Tareas</h1>
        <p class="page-desc">Gestión y seguimiento de actividades</p>
      </div>
      <button class="btn btn-primary" onclick="openTaskModal()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        Nueva tarea
      </button>
    </div>

    <!-- KPIs -->
    <div class="tasks-kpi">
      <div class="tasks-kpi-card">
        <div class="tasks-kpi-label">Total</div>
        <div class="tasks-kpi-value" id="kpiTotal">0</div>
      </div>
      <div class="tasks-kpi-card">
        <div class="tasks-kpi-label">Pendientes</div>
        <div class="tasks-kpi-value" id="kpiPending" style="color:var(--amber)">0</div>
      </div>
      <div class="tasks-kpi-card">
        <div class="tasks-kpi-label">Completadas</div>
        <div class="tasks-kpi-value" id="kpiDone" style="color:var(--green)">0</div>
      </div>
      <div class="tasks-kpi-card">
        <div class="tasks-kpi-label">Vencidas</div>
        <div class="tasks-kpi-value" id="kpiOverdue" style="color:var(--red)">0</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-box">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M9.5 9.5l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <input class="search-input" id="taskSearch" placeholder="Buscar tarea…" oninput="renderTasks()" />
      </div>
      <div class="filter-pills">
        <button class="pill active" onclick="setFilter('all',this)">Todas</button>
        <button class="pill" onclick="setFilter('pending',this)">Pendientes</button>
        <button class="pill" onclick="setFilter('done',this)">Completadas</button>
      </div>
      <select class="select-sm" id="filterSubject" onchange="renderTasks()">
        <option value="">Todas las materias</option>
      </select>
      <select class="select-sm" id="filterPriority" onchange="renderTasks()">
        <option value="">Prioridad</option>
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baja">Baja</option>
      </select>
    </div>

    <div class="task-list" id="taskList"></div>
  </div>

  <!-- ── MODAL Tarea ── -->
  <div class="modal-bg" id="taskModal">
    <div class="modal-box">
      <div class="modal-head">
        <span class="modal-title" id="taskModalTitle">Nueva tarea</span>
        <button class="modal-close" onclick="closeModal('taskModal')">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="form-field"><label class="field-label">Título *</label><input class="field-input" id="tTitle" placeholder="Ej: Estudiar Capítulo 3" /></div>
      <div class="form-field"><label class="field-label">Descripción</label><textarea class="field-input field-textarea" id="tDesc" placeholder="Detalles opcionales…"></textarea></div>
      <div class="form-row">
        <div class="form-field"><label class="field-label">Materia</label><select class="field-select" id="tSubject"><option value="">Sin materia</option></select></div>
        <div class="form-field"><label class="field-label">Prioridad</label><select class="field-select" id="tPriority"><option value="media">Media</option><option value="alta">Alta</option><option value="baja">Baja</option></select></div>
      </div>
      <div class="form-field"><label class="field-label">Fecha de entrega</label><input class="field-input" type="date" id="tDue" /></div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal('taskModal')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveTask()">Guardar</button>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script src="../js/app.js"></script>
  <script src="../js/tasks.js"></script>
  <script>
    // ── Page-specific init ──
    const APP = { currentPage: 'tasks', theme: localStorage.getItem('ap_theme') || 'light', taskFilter: 'all' };

    document.addEventListener('DOMContentLoaded', () => {
      applyTheme();
      updateSidebarProfile();
      populateSubjectSelects();
      renderTasks();
      updateKPIs();
    });

    function updateKPIs() {
      const tasks   = DB.get('tasks');
      const today   = new Date().toISOString().slice(0,10);
      const overdue = tasks.filter(t => !t.done && t.due && t.due < today).length;
      el('kpiTotal').textContent   = tasks.length;
      el('kpiPending').textContent = tasks.filter(t => !t.done).length;
      el('kpiDone').textContent    = tasks.filter(t =>  t.done).length;
      el('kpiOverdue').textContent = overdue;
      const badge = el('navBadge');
      if (badge) badge.textContent = tasks.filter(t => !t.done).length;
    }

    // Override renderTasks to also update KPIs
    const _origRender = renderTasks;
    // We patch after tasks.js loads — already done via DOMContentLoaded order

    // Mobile sidebar helpers needed here too
    function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { document.querySelectorAll('.modal-bg.open').forEach(m => m.classList.remove('open')); closeSidebar(); }
    });
    document.querySelectorAll('.modal-bg').forEach(bg => bg.addEventListener('click', e => { if (e.target === bg) bg.classList.remove('open'); }));
  </script>
</body>
</html>
