<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro — Academic Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/dark-mode.css" />
  <style>
    body { display: flex; }
    .page-wrap { margin-left: var(--sidebar-w); flex: 1; padding: 2.5rem 2.25rem; max-width: 1000px; }
    @media (max-width: 768px) { .page-wrap { margin-left: 0; padding: 1.25rem; padding-top: 4.5rem; } .pom-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><div class="logo-mark"></div><span class="logo-text"><a href="../index.html">Academic<strong>Planner</strong></a></span></div>
    </div>
    <div class="sidebar-profile" onclick="window.location='profile.html'">
      <div class="avatar"><span id="sidebarInitials">–</span></div>
      <div class="profile-meta"><span class="profile-name" id="sidebarName">Mi perfil</span><span class="profile-sub" id="sidebarSub">Estudiante</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-group-label">General</div>
      <a class="nav-item" href="../index.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/></svg>
        Dashboard
      </a>
      <a class="nav-item" href="tasks.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Tareas
      </a>
      <a class="nav-item" href="grades.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1l1.9 3.8 4.2.6-3 2.9.7 4.2L8 10.4l-3.8 2 .7-4.2-3-2.9 4.2-.6L8 1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        Notas
      </a>
      <div class="nav-group-label">Productividad</div>
      <a class="nav-item active" href="pomodoro.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="9" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M8 6v3l2 1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 1h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Pomodoro
      </a>
      <a class="nav-item" href="calendar.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3" width="13" height="11.5" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M1.5 7h13" stroke="currentColor" stroke-width="1.4"/><path d="M5 1.5V4M11 1.5V4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Calendario
      </a>
      <div class="nav-group-label">Cuenta</div>
      <a class="nav-item" href="profile.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Perfil
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-btn" onclick="toggleTheme()">
        <svg id="themeIcon" width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 1v1M7.5 13v1M1 7.5H2M13 7.5h1M3.2 3.2l.7.7M11.1 11.1l.7.7M3.2 11.8l.7-.7M11.1 4.4l.7-.7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="7.5" cy="7.5" r="3" stroke="currentColor" stroke-width="1.4"/></svg>
        <span id="themeLabel">Modo oscuro</span>
        <div class="toggle" id="themeToggle"></div>
      </button>
    </div>
  </aside>

  <div class="topbar-mobile">
    <button class="hamburger" onclick="openSidebar()"><span></span><span></span><span></span></button>
    <span class="topbar-title">Pomodoro</span>
  </div>

  <div class="page-wrap">
    <div class="page-header">
      <div>
        <h1 class="page-title">Pomodoro</h1>
        <p class="page-desc">Sesiones de estudio enfocado</p>
      </div>
    </div>

    <div class="pom-layout">
      <!-- Timer -->
      <div class="pom-main">
        <div class="pom-modes">
          <button class="pom-mode active" onclick="setPomMode('focus',this)">Enfoque</button>
          <button class="pom-mode" onclick="setPomMode('short',this)">Descanso corto</button>
          <button class="pom-mode" onclick="setPomMode('long',this)">Descanso largo</button>
        </div>
        <div class="pom-ring-wrap">
          <svg class="pom-svg" viewBox="0 0 200 200">
            <circle class="ring-track" cx="100" cy="100" r="88"/>
            <circle class="ring-fill" id="pomRing" cx="100" cy="100" r="88" stroke-dasharray="553" stroke-dashoffset="0"/>
          </svg>
          <div class="pom-center">
            <div class="pom-time" id="pomTime">25:00</div>
            <div class="pom-state" id="pomState">Listo</div>
          </div>
        </div>
        <div class="pom-controls">
          <button class="pom-ctrl-secondary" onclick="resetPom()">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8a6 6 0 1 0 1.5-3.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2 4v4h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="pom-ctrl-primary" id="pomBtn" onclick="togglePom()">Iniciar</button>
          <button class="pom-ctrl-secondary" onclick="skipPom()">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 3l8 5-8 5V3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M13 3v10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="pom-dots" id="pomDots"></div>
        <div class="pom-config">
          <div class="pom-cfg-item"><label class="cfg-label">Enfoque (min)</label><input class="cfg-input" type="number" id="cfgFocus" value="25" min="1" max="60" onchange="applyPomConfig()" /></div>
          <div class="pom-cfg-item"><label class="cfg-label">Descanso corto</label><input class="cfg-input" type="number" id="cfgShort" value="5" min="1" max="30" onchange="applyPomConfig()" /></div>
          <div class="pom-cfg-item"><label class="cfg-label">Descanso largo</label><input class="cfg-input" type="number" id="cfgLong" value="15" min="5" max="60" onchange="applyPomConfig()" /></div>
        </div>
      </div>

      <!-- Stats aside -->
      <div class="pom-aside">
        <div class="card">
          <div class="card-head"><span class="card-title">Hoy</span></div>
          <div class="stat-rows" id="pomStatRows"></div>
        </div>
        <div class="card" style="margin-top:1rem;">
          <div class="card-head"><span class="card-title">Historial reciente</span></div>
          <div class="pom-log" id="pomLog"><div class="empty-msg">Sin sesiones aún</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script src="../js/app.js"></script>
  <script src="../js/pomodoro.js"></script>
  <script>
    const APP = { currentPage: 'pomodoro', theme: localStorage.getItem('ap_theme') || 'light', taskFilter: 'all' };
    document.addEventListener('DOMContentLoaded', () => { applyTheme(); updateSidebarProfile(); });
    function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSidebar(); });
    // stubs
    function renderDashKPIs() {}
  </script>
</body>
</html>
