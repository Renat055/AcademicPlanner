<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendario — Academic Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/dark-mode.css" />
  <style>
    body { display: flex; }
    .page-wrap { margin-left: var(--sidebar-w); flex: 1; padding: 2.5rem 2.25rem; }
    @media (max-width: 768px) { .page-wrap { margin-left: 0; padding: 1.25rem; padding-top: 4.5rem; } .cal-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><div class="logo-mark"></div><span class="logo-text"><a href="../index.html">Academic<strong>Planner</strong></a></span></div>
    </div>
    <div class="sidebar-profile" onclick="window.location='profile.html'">
      <div class="avatar"><span id="sidebarInitials">–</span></div>
      <div class="profile-meta"><span class="profile-name" id="sidebarName">Mi perfil</span><span class="profile-sub" id="sidebarSub">Estudiante</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-group-label">General</div>
      <a class="nav-item" href="../index.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/></svg>
        Dashboard
      </a>
      <a class="nav-item" href="tasks.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Tareas
      </a>
      <a class="nav-item" href="grades.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1l1.9 3.8 4.2.6-3 2.9.7 4.2L8 10.4l-3.8 2 .7-4.2-3-2.9 4.2-.6L8 1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        Notas
      </a>
      <div class="nav-group-label">Productividad</div>
      <a class="nav-item" href="pomodoro.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="9" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M8 6v3l2 1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 1h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Pomodoro
      </a>
      <a class="nav-item active" href="calendar.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3" width="13" height="11.5" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M1.5 7h13" stroke="currentColor" stroke-width="1.4"/><path d="M5 1.5V4M11 1.5V4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Calendario
      </a>
      <div class="nav-group-label">Cuenta</div>
      <a class="nav-item" href="profile.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Perfil
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-btn" onclick="toggleTheme()">
        <svg id="themeIcon" width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 1v1M7.5 13v1M1 7.5H2M13 7.5h1M3.2 3.2l.7.7M11.1 11.1l.7.7M3.2 11.8l.7-.7M11.1 4.4l.7-.7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="7.5" cy="7.5" r="3" stroke="currentColor" stroke-width="1.4"/></svg>
        <span id="themeLabel">Modo oscuro</span>
        <div class="toggle" id="themeToggle"></div>
      </button>
    </div>
  </aside>

  <div class="topbar-mobile">
    <button class="hamburger" onclick="openSidebar()"><span></span><span></span><span></span></button>
    <span class="topbar-title">Calendario</span>
  </div>

  <div class="page-wrap">
    <div class="page-header">
      <div>
        <h1 class="page-title">Calendario</h1>
        <p class="page-desc">Exámenes, entregas y eventos</p>
      </div>
      <button class="btn btn-primary" onclick="openEventModal()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        Nuevo evento
      </button>
    </div>

    <div class="cal-layout">
      <div class="card cal-card">
        <div class="cal-nav">
          <button class="icon-btn" onclick="calNav(-1)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          <span class="cal-month-label" id="calLabel">–</span>
          <div style="display:flex;gap:6px;">
            <button class="cal-today-btn" onclick="calNav(0)">Hoy</button>
            <button class="icon-btn" onclick="calNav(1)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          </div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>

      <div class="cal-panel">
        <div class="card">
          <div class="card-head"><span class="card-title" id="calDayTitle">Selecciona un día</span></div>
          <div class="list-wrap" id="calDayEvents"><div class="empty-msg">Sin eventos</div></div>
        </div>
        <div class="card" style="margin-top:1rem;">
          <div class="card-head"><span class="card-title">Próximos</span></div>
          <div class="list-wrap" id="calUpcoming"><div class="empty-msg">Sin eventos próximos</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Evento -->
  <div class="modal-bg" id="eventModal">
    <div class="modal-box">
      <div class="modal-head">
        <span class="modal-title" id="eventModalTitle">Nuevo evento</span>
        <button class="modal-close" onclick="closeModal('eventModal')"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
      </div>
      <div class="form-field"><label class="field-label">Título *</label><input class="field-input" id="evTitle" placeholder="Ej: Examen Física" /></div>
      <div class="form-row">
        <div class="form-field"><label class="field-label">Tipo</label>
          <select class="field-select" id="evType">
            <option value="exam">Examen</option><option value="due">Entrega</option>
            <option value="class">Clase</option><option value="event">Evento</option>
            <option value="reminder">Recordatorio</option>
          </select>
        </div>
        <div class="form-field"><label class="field-label">Materia</label><select class="field-select" id="evSubject"><option value="">Sin materia</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-field"><label class="field-label">Fecha *</label><input class="field-input" type="date" id="evDate" /></div>
        <div class="form-field"><label class="field-label">Hora</label><input class="field-input" type="time" id="evTime" /></div>
      </div>
      <div class="form-field"><label class="field-label">Descripción</label><textarea class="field-input field-textarea" id="evDesc" placeholder="Detalles…"></textarea></div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal('eventModal')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveEvent()">Guardar</button>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script src="../js/app.js"></script>
  <script src="../js/calendar.js"></script>
  <script>
    const APP = { currentPage: 'calendar', theme: localStorage.getItem('ap_theme') || 'light', taskFilter: 'all' };
    document.addEventListener('DOMContentLoaded', () => { applyTheme(); updateSidebarProfile(); populateSubjectSelects(); renderCalendar(); });
    function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { document.querySelectorAll('.modal-bg.open').forEach(m => m.classList.remove('open')); closeSidebar(); } });
    document.querySelectorAll('.modal-bg').forEach(bg => bg.addEventListener('click', e => { if (e.target === bg) bg.classList.remove('open'); }));
    // stubs
    function renderDashboard() {}
  </script>
</body>
</html>
