<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil — Academic Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/dark-mode.css" />
  <style>
    body { display: flex; }
    .page-wrap { margin-left: var(--sidebar-w); flex: 1; padding: 2.5rem 2.25rem; max-width: 820px; }

    /* Profile hero */
    .profile-hero {
      background: var(--text-1);
      color: var(--surface);
      border-radius: var(--r-xl);
      padding: 2rem 2.25rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .profile-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(255,255,255,.06) 0%, transparent 60%);
      pointer-events: none;
    }
    .profile-avatar-big {
      width: 68px; height: 68px;
      border-radius: 50%;
      background: rgba(255,255,255,.12);
      border: 2px solid rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 600;
      flex-shrink: 0;
    }
    .profile-hero-info h2 { font-size: 1.3rem; font-weight: 600; letter-spacing: -.02em; }
    .profile-hero-info p  { font-size: .85rem; opacity: .65; margin-top: 3px; }
    .profile-hero-stats {
      margin-left: auto;
      display: flex; gap: 2rem;
      text-align: center;
    }
    .hero-stat-val  { font-size: 1.4rem; font-weight: 600; letter-spacing: -.03em; }
    .hero-stat-lbl  { font-size: .7rem; opacity: .55; margin-top: 2px; }

    /* Data management */
    .data-actions { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }

    @media (max-width: 768px) {
      .page-wrap { margin-left: 0; padding: 1.25rem; padding-top: 4.5rem; }
      .profile-layout { grid-template-columns: 1fr; }
      .profile-hero-stats { display: none; }
    }
  </style>
</head>
<body>

  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><div class="logo-mark"></div><span class="logo-text"><a href="../index.html">Academic<strong>Planner</strong></a></span></div>
    </div>
    <div class="sidebar-profile" onclick="">
      <div class="avatar"><span id="sidebarInitials">–</span></div>
      <div class="profile-meta"><span class="profile-name" id="sidebarName">Mi perfil</span><span class="profile-sub" id="sidebarSub">Estudiante</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-group-label">General</div>
      <a class="nav-item" href="../index.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/></svg>
        Dashboard
      </a>
      <a class="nav-item" href="tasks.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Tareas
      </a>
      <a class="nav-item" href="grades.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1l1.9 3.8 4.2.6-3 2.9.7 4.2L8 10.4l-3.8 2 .7-4.2-3-2.9 4.2-.6L8 1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        Notas
      </a>
      <div class="nav-group-label">Productividad</div>
      <a class="nav-item" href="pomodoro.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="9" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M8 6v3l2 1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 1h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Pomodoro
      </a>
      <a class="nav-item" href="calendar.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3" width="13" height="11.5" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M1.5 7h13" stroke="currentColor" stroke-width="1.4"/><path d="M5 1.5V4M11 1.5V4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Calendario
      </a>
      <div class="nav-group-label">Cuenta</div>
      <a class="nav-item active" href="profile.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Perfil
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-btn" onclick="toggleTheme()">
        <svg id="themeIcon" width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 1v1M7.5 13v1M1 7.5H2M13 7.5h1M3.2 3.2l.7.7M11.1 11.1l.7.7M3.2 11.8l.7-.7M11.1 4.4l.7-.7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="7.5" cy="7.5" r="3" stroke="currentColor" stroke-width="1.4"/></svg>
        <span id="themeLabel">Modo oscuro</span>
        <div class="toggle" id="themeToggle"></div>
      </button>
    </div>
  </aside>

  <div class="topbar-mobile">
    <button class="hamburger" onclick="openSidebar()"><span></span><span></span><span></span></button>
    <span class="topbar-title">Perfil</span>
  </div>

  <div class="page-wrap">
    <div class="page-header">
      <div>
        <h1 class="page-title">Perfil</h1>
        <p class="page-desc">Tu información y estadísticas académicas</p>
      </div>
    </div>

    <!-- Hero card -->
    <div class="profile-hero" id="profileHero">
      <div class="profile-avatar-big" id="profileAvatarBig">–</div>
      <div class="profile-hero-info">
        <h2 id="profileHeroName">Tu nombre</h2>
        <p  id="profileHeroSub">Estudiante</p>
      </div>
      <div class="profile-hero-stats" id="profileHeroStats"></div>
    </div>

    <div class="profile-layout">
      <!-- Form -->
      <div class="card">
        <div class="card-head"><span class="card-title">Información personal</span></div>
        <div class="form-row">
          <div class="form-field"><label class="field-label">Nombre completo</label><input class="field-input" id="pfName" placeholder="Ej: Ana García" /></div>
          <div class="form-field"><label class="field-label">Universidad</label><input class="field-input" id="pfUniversity" placeholder="Nombre de tu universidad" /></div>
        </div>
        <div class="form-row">
          <div class="form-field"><label class="field-label">Carrera</label><input class="field-input" id="pfCareer" placeholder="Ej: Ingeniería en Sistemas" /></div>
          <div class="form-field"><label class="field-label">Semestre</label><input class="field-input" id="pfSemester" placeholder="Ej: 4to semestre" /></div>
        </div>
        <button class="btn btn-primary" onclick="savePf()" style="width:100%;justify-content:center;">Guardar cambios</button>

        <div class="data-actions">
          <button class="btn btn-ghost" onclick="exportData()">Exportar datos</button>
          <button class="btn btn-danger" onclick="clearData()">Borrar todo</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="card">
        <div class="card-head"><span class="card-title">Resumen académico</span></div>
        <div class="stat-rows" id="profileStats"></div>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script src="../js/app.js"></script>
  <script>
    const APP = { currentPage: 'profile', theme: localStorage.getItem('ap_theme') || 'light', taskFilter: 'all' };

    document.addEventListener('DOMContentLoaded', () => {
      applyTheme();
      loadPf();
      renderProfilePage();
    });

    function loadPf() {
      const p = DB.get('profile', {});
      setVal('pfName',       p.name       || '');
      setVal('pfUniversity', p.university || '');
      setVal('pfCareer',     p.career     || '');
      setVal('pfSemester',   p.semester   || '');
    }

    function savePf() {
      const p = {
        name:       val('pfName'),
        university: val('pfUniversity'),
        career:     val('pfCareer'),
        semester:   val('pfSemester'),
      };
      DB.set('profile', p);
      renderProfilePage();
      updateSidebarProfile();
      toast('Perfil guardado', 'success');
    }

    function renderProfilePage() {
      updateSidebarProfile();
      const p        = DB.get('profile', {});
      const tasks    = DB.get('tasks');
      const subjects = DB.get('subjects');
      const grades   = DB.get('grades');
      const pomLog   = DB.get('pom_log', []);
      const avg      = calcOverallAvg(subjects, grades);

      // Hero
      const name     = p.name || 'Tu nombre';
      const initials = name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';
      el('profileAvatarBig').textContent = initials;
      el('profileHeroName').textContent  = name;
      el('profileHeroSub').textContent   = [p.career, p.university].filter(Boolean).join(' · ') || 'Estudiante';

      // Hero stats
      el('profileHeroStats').innerHTML = `
        <div><div class="hero-stat-val">${tasks.filter(t=>t.done).length}</div><div class="hero-stat-lbl">Completadas</div></div>
        <div><div class="hero-stat-val">${avg !== null ? avg.toFixed(1) : '–'}</div><div class="hero-stat-lbl">Promedio</div></div>
        <div><div class="hero-stat-val">${pomLog.length}</div><div class="hero-stat-lbl">Pomodoros</div></div>
      `;

      // Stat rows
      const focusMins = parseInt(localStorage.getItem('ap_cfg_focus') || '25');
      el('profileStats').innerHTML = `
        <div class="stat-row"><span class="stat-row-label">Tareas completadas</span><span class="stat-row-value">${tasks.filter(t=>t.done).length}</span></div>
        <div class="stat-row"><span class="stat-row-label">Tareas pendientes</span><span class="stat-row-value">${tasks.filter(t=>!t.done).length}</span></div>
        <div class="stat-row"><span class="stat-row-label">Promedio general</span><span class="stat-row-value">${avg!==null?avg.toFixed(2):'–'}</span></div>
        <div class="stat-row"><span class="stat-row-label">Materias activas</span><span class="stat-row-value">${subjects.length}</span></div>
        <div class="stat-row"><span class="stat-row-label">Notas registradas</span><span class="stat-row-value">${grades.length}</span></div>
        <div class="stat-row"><span class="stat-row-label">Pomodoros totales</span><span class="stat-row-value">${pomLog.length}</span></div>
        <div class="stat-row"><span class="stat-row-label">Horas de enfoque</span><span class="stat-row-value">${Math.round(pomLog.length*focusMins/60*10)/10} h</span></div>
        <div class="stat-row"><span class="stat-row-label">Eventos en calendario</span><span class="stat-row-value">${DB.get('events').length}</span></div>
      `;
    }

    function clearData() {
      if (!confirm('¿Borrar todos los datos? Esta acción no se puede deshacer.')) return;
      ['tasks','subjects','grades','events','profile','pom_log'].forEach(k => localStorage.removeItem('ap_'+k));
      toast('Datos eliminados');
      loadPf();
      renderProfilePage();
    }

    function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSidebar(); });
  </script>
</body>
</html>
