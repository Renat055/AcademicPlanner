<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notas — Academic Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/dark-mode.css" />
  <style>
    body { display: flex; }
    .page-wrap { margin-left: var(--sidebar-w); flex: 1; padding: 2.5rem 2.25rem; }
    @media (max-width: 768px) { .page-wrap { margin-left: 0; padding: 1.25rem; padding-top: 4.5rem; } }
  </style>
</head>
<body>

  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><div class="logo-mark"></div><span class="logo-text"><a href="../index.html">Academic<strong>Planner</strong></a></span></div>
    </div>
    <div class="sidebar-profile" onclick="window.location='profile.html'">
      <div class="avatar"><span id="sidebarInitials">–</span></div>
      <div class="profile-meta"><span class="profile-name" id="sidebarName">Mi perfil</span><span class="profile-sub" id="sidebarSub">Estudiante</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-group-label">General</div>
      <a class="nav-item" href="../index.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/></svg>
        Dashboard
      </a>
      <a class="nav-item" href="tasks.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Tareas
      </a>
      <a class="nav-item active" href="grades.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1l1.9 3.8 4.2.6-3 2.9.7 4.2L8 10.4l-3.8 2 .7-4.2-3-2.9 4.2-.6L8 1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        Notas
      </a>
      <div class="nav-group-label">Productividad</div>
      <a class="nav-item" href="pomodoro.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="9" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M8 6v3l2 1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 1h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Pomodoro
      </a>
      <a class="nav-item" href="calendar.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3" width="13" height="11.5" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M1.5 7h13" stroke="currentColor" stroke-width="1.4"/><path d="M5 1.5V4M11 1.5V4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Calendario
      </a>
      <div class="nav-group-label">Cuenta</div>
      <a class="nav-item" href="profile.html">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Perfil
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-btn" onclick="toggleTheme()">
        <svg id="themeIcon" width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 1v1M7.5 13v1M1 7.5H2M13 7.5h1M3.2 3.2l.7.7M11.1 11.1l.7.7M3.2 11.8l.7-.7M11.1 4.4l.7-.7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="7.5" cy="7.5" r="3" stroke="currentColor" stroke-width="1.4"/></svg>
        <span id="themeLabel">Modo oscuro</span>
        <div class="toggle" id="themeToggle"></div>
      </button>
    </div>
  </aside>

  <div class="topbar-mobile">
    <button class="hamburger" onclick="openSidebar()"><span></span><span></span><span></span></button>
    <span class="topbar-title">Notas académicas</span>
  </div>

  <div class="page-wrap">
    <div class="page-header">
      <div>
        <h1 class="page-title">Notas académicas</h1>
        <p class="page-desc">Materias, calificaciones y promedios</p>
      </div>
      <div class="btn-group">
        <button class="btn btn-ghost" onclick="openSubjectModal()">Nueva materia</button>
        <button class="btn btn-primary" onclick="openGradeModal()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          Nueva nota
        </button>
      </div>
    </div>

    <!-- Average banner -->
    <div class="avg-banner" id="avgBanner">
      <div class="avg-banner-left">
        <div class="avg-label">Promedio general del semestre</div>
        <div class="avg-number" id="avgNumber">–</div>
      </div>
      <div class="avg-banner-right" id="avgBannerRight"></div>
    </div>

    <div class="subjects-grid" id="subjectsGrid">
      <div class="empty-msg" style="padding:3rem;text-align:center">Agrega tu primera materia para comenzar</div>
    </div>
  </div>

  <!-- Modal: Materia -->
  <div class="modal-bg" id="subjectModal">
    <div class="modal-box">
      <div class="modal-head">
        <span class="modal-title" id="subjectModalTitle">Nueva materia</span>
        <button class="modal-close" onclick="closeModal('subjectModal')"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
      </div>
      <div class="form-field"><label class="field-label">Nombre *</label><input class="field-input" id="sName" placeholder="Ej: Cálculo Diferencial" /></div>
      <div class="form-field"><label class="field-label">Profesor</label><input class="field-input" id="sTeacher" placeholder="Nombre del docente" /></div>
      <div class="form-row">
        <div class="form-field"><label class="field-label">Color</label>
          <select class="field-select" id="sColor">
            <option value="blue">Azul</option><option value="indigo">Índigo</option>
            <option value="violet">Violeta</option><option value="green">Verde</option>
            <option value="teal">Teal</option><option value="orange">Naranja</option>
            <option value="rose">Rosa</option>
          </select>
        </div>
        <div class="form-field"><label class="field-label">Nota objetivo</label><input class="field-input" type="number" id="sGoal" value="7" min="0" max="10" step="0.1" /></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal('subjectModal')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveSubject()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Nota -->
  <div class="modal-bg" id="gradeModal">
    <div class="modal-box">
      <div class="modal-head">
        <span class="modal-title">Nueva nota</span>
        <button class="modal-close" onclick="closeModal('gradeModal')"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
      </div>
      <div class="form-field"><label class="field-label">Materia *</label><select class="field-select" id="gSubject"><option value="">Selecciona una materia</option></select></div>
      <div class="form-field"><label class="field-label">Actividad *</label><input class="field-input" id="gName" placeholder="Ej: Examen Parcial 1" /></div>
      <div class="form-row">
        <div class="form-field"><label class="field-label">Nota</label><input class="field-input" type="number" id="gValue" placeholder="8.5" min="0" step="0.1" /></div>
        <div class="form-field"><label class="field-label">Sobre</label><input class="field-input" type="number" id="gMax" value="10" min="0" step="0.1" /></div>
      </div>
      <div class="form-row">
        <div class="form-field"><label class="field-label">Peso (%)</label><input class="field-input" type="number" id="gWeight" value="100" min="1" max="100" /></div>
        <div class="form-field"><label class="field-label">Fecha</label><input class="field-input" type="date" id="gDate" /></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal('gradeModal')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveGrade()">Guardar</button>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script src="../js/app.js"></script>
  <script src="../js/grades.js"></script>
  <script>
    const APP = { currentPage: 'grades', theme: localStorage.getItem('ap_theme') || 'light', taskFilter: 'all' };
    document.addEventListener('DOMContentLoaded', () => {
      applyTheme(); updateSidebarProfile(); populateSubjectSelects(); renderGrades();
    });
    function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { document.querySelectorAll('.modal-bg.open').forEach(m => m.classList.remove('open')); closeSidebar(); } });
    document.querySelectorAll('.modal-bg').forEach(bg => bg.addEventListener('click', e => { if (e.target === bg) bg.classList.remove('open'); }));
    // stubs needed by grades.js
    function renderDashSubjects() {}
    function renderDashboard() {}
    function renderDashKPIs() {}
  </script>
</body>
</html>
